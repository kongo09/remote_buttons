name: Linting

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "pyproject.toml"
  pull_request:
    paths:
      - "**.py"
      - "pyproject.toml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: Ruff check
        run: ruff check --output-format=github custom_components/
      - name: Ruff format
        run: ruff format --check --diff custom_components/
